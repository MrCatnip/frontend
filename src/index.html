<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register a user</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="reset.css" />
  </head>
  <body>
    <form novalidate id="user-form">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" maxlength="20" />
        <span class="hint" id="hint-username">Between 1-20 chars & nothing weird please!</span>
        <span class="error" id="error-username"></span>
      </div>
      <div class="field">
        <label for="first_name">First name</label>
        <input type="text" id="first_name" maxlength="255" />
        <span class="hint" id="hint-first_name">Between 1-255 chars</span>
        <span class="error" id="error-first_name"></span>
      </div>
      <div class="field">
        <label for="last_name">Last name</label>
        <input type="text" id="last_name" maxlength="255" />
        <span class="hint" id="hint-last_name">Between 1-255 chars</span>
        <span class="error" id="error-last_name"></span>
      </div>
      <div class="field">
        <label for="age">Age</label>
        <input type="number" id="age" min="0" max="150" />
        <span class="hint" id="hint-age">Between 0-150</span>
        <span class="error" id="error-age"></span>
      </div>
      <div class="field">
        <label for="avatar">Avatar</label>
        <input type="file" id="avatar" accept="image/png,image/jpeg,image/webp,image/gif" />
        <button type="button" id="clear" disabled>Clear</button>
        <span class="hint" id="hint-avatar">Chuck Norris</span>
        <span class="error" id="error-avatar"></span>
      </div>
      <button type="submit" id="submit-btn">Register</button>
      <span id="success" class="hint">✅ Success!</span>
      <span id="error" class="error"></span>
    </form>
    <script src="main.js"></script>
  </body>
</html>
